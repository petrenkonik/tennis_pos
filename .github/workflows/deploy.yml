name: Deploy to GitHub Pages

on:
  # Trigger on every push to main (code or docs changes that affect the site)
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# GITHUB_TOKEN permissions required for GitHub Pages deployment.
# - contents: read  -> checkout the repo
# - pages: write     -> publish the built site
# - id-token: write  -> OIDC auth for the deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancel any in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite, base=/tennis_pos/ via GITHUB_ACTIONS env)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
